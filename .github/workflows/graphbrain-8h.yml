name: graphbrain-8h

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  run-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: archonx-rust

      - name: Build archonx-graphbrain (release)
        run: cargo build --release --bin archonx-graphbrain
        working-directory: archonx-rust

      - name: Run GraphBrain full mode
        run: ./archonx-rust/target/release/archonx-graphbrain --mode full --root .

      - name: Upload GraphBrain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphbrain-full
          path: |
            data/graphbrain
            data/reports
            data/audit/graphbrain.log
            data/dashboard
