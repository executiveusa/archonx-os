name: graphbrain-15m

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: archonx-rust

      - name: Build archonx-graphbrain (release)
        run: cargo build --release --bin archonx-graphbrain
        working-directory: archonx-rust

      - name: Run GraphBrain light mode
        run: ./archonx-rust/target/release/archonx-graphbrain --mode light --root .

      - name: Verify fresh report exists
        run: test -f data/reports/graphbrain_latest.json

      - name: Upload GraphBrain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphbrain-light
          path: |
            data/reports/graphbrain_latest.json
            data/audit/graphbrain.log
